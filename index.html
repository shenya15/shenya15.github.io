<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻星空网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #0b0f19;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 60px 70px, #fff, transparent),
                radial-gradient(1px 1px at 50px 50px, #ddd, transparent),
                radial-gradient(2px 2px at 120px 150px, #fff, transparent);
            background-size: 200px 200px;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 40px rgba(100, 150, 255, 0.2);
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 0 60px rgba(120, 180, 255, 0.4);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 15px;
            color: #c0dfff;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        button {
            padding: 14px 30px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #6a9eff, #9166ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(106, 158, 255, 0.6);
        }
    </style>
</head>
<body>

<div class="stars"></div>

<div class="card">
    <h1>✨ 梦幻星空</h1>
    <p>鼠标移过来看看，会发光哦～</p>
    <button onclick="alert('你点亮了整片星空！')">点我许愿</button>
</div>

</body>
</html>
